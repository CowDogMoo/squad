---
# Embedded fallback for the launch-form model typeahead, used when the
# live LiteLLM registry has not finished loading (cold start, offline,
# fetch error). Lists are non-exhaustive — the typeahead accepts any
# free-text value the user types.
openai:
  - gpt-5
  - gpt-5-mini
  - gpt-4.1
  - gpt-4.1-mini
  - gpt-4o
  - gpt-4o-mini
  - o3
  - o3-mini
openai-responses:
  - gpt-5
  - gpt-5-mini
  - gpt-4.1
  - gpt-4.1-mini
  - gpt-4o
  - gpt-4o-mini
  - o3
  - o3-mini
anthropic:
  - claude-opus-4-7
  - claude-sonnet-4-6
  - claude-haiku-4-5-20251001
gemini:
  - gemini-2.5-pro
  - gemini-2.5-flash
  - gemini-2.0-flash
ollama: []
