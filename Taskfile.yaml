---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  BINARY_NAME: squad
  CMD_PATH: ./cmd/squad

  # Provider configuration
  PROVIDER: '{{.PROVIDER | default "ollama"}}'
  BASE_URL: '{{.BASE_URL | default ""}}'
  MODEL: '{{.MODEL | default "qwen3-coder:30b"}}'
  API_KEY: '{{.API_KEY | default ""}}'

  # Agent configuration
  AGENT: '{{.AGENT | default "go-cobra"}}'
  WORKING_DIR: '{{.WORKING_DIR | default "."}}'
  OUT_DIR: '{{.OUT_DIR | default "/tmp"}}'
  OUT: '{{.OUT | default (print .OUT_DIR "/squad-response.txt")}}'

  # Internal: conditionally include --base-url flag
  _BASE_URL_FLAG: '{{if .BASE_URL}}--base-url {{.BASE_URL}}{{end}}'
  _API_KEY_FLAG: '{{if .API_KEY}}--api-key {{.API_KEY}}{{end}}'

includes:
  go:
    taskfile: "https://raw.githubusercontent.com/CowDogMoo/taskfile-templates/main/go/Taskfile.yaml"
    vars:
      BINARY_NAME: '{{.BINARY_NAME}}'
      CMD_PATH: '{{.CMD_PATH}}'
  pre-commit:
    taskfile: "https://raw.githubusercontent.com/CowDogMoo/taskfile-templates/main/pre-commit/Taskfile.yaml"

tasks:
  default:
    desc: Build, test, and clean
    cmds:
      - task: go:default

  run:
    desc: "Run an agent with a prompt (usage: task run PROMPT='your prompt here')"
    silent: true
    vars:
      PROMPT: '{{.PROMPT | default ""}}'
    preconditions:
      - sh: test -n "{{.PROMPT}}"
        msg: "PROMPT is required. Usage: task run PROMPT='your prompt here'"
    cmds:
      - |
        go run ./cmd/squad run -v \
          "{{.PROMPT}}" \
          --agent {{.AGENT}} \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --out {{.OUT}}

  run:go-review:
    desc: "Run the go-review agent to autonomously fix Go code quality issues"
    silent: true
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Review and fix all Go code quality issues in this codebase.

        Start by using Glob with '**/*.go' to discover all Go source files.
        Read each file (skip _test.go and vendor/).
        Cross-reference between files for consistency issues.
        Apply fixes via Edit tool, highest severity first.
        Run 'go build ./...' after each batch of edits.

        IMPORTANT CONSTRAINTS (repeat from system prompt):
        - No cosmetic changes (doc comments, import ordering, naming style)
        - No new dependencies
        - Skip fixes needing 50+ lines or new files
        - Preserve backwards compatibility — no API surface changes
        - NEVER change functions whose behavior is asserted by tests (especially panics with wantPanic/recover)
        - NEVER remove intentional panic() calls — they are precondition guards, not bugs
        - Every fix must be PROPORTIONAL — no micro-optimizations for small loops
        - Flag inconsistent imports (e.g. 'log' when codebase uses custom logging)
        - Read each file ONCE, catalog all findings, then fix — target ≤12 iterations
        - Use ONE Grep/Glob on repo root, not per-directory — minimize tool calls
        - After go build + go test pass, emit report IMMEDIATELY — no post-fix exploration
        - Every file touched must appear in the output report" \
          --agent go-review \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --out {{.OUT_DIR}}/squad-go-review.txt
      - echo "Review output written to {{.OUT_DIR}}/squad-go-review.txt"
      - |
        echo ""
        echo "Running final verification..."
      - go build ./...
      - echo "go build ./... PASSED"

  run:go-review-analyze:
    desc: "Run the go-review agent in readonly mode to analyze Go code quality without applying fixes"
    silent: true
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Analyze this codebase for Go code quality issues.

        Use Glob with '**/*.go' to discover all Go source files.
        Read each file (skip _test.go and vendor/).
        Cross-reference between files for consistency issues.
        Produce a prioritized report of all findings.

        Do NOT write or modify any files." \
          --agent go-review --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out {{.OUT_DIR}}/squad-go-review-analysis.txt
      - echo "Go review analysis written to {{.OUT_DIR}}/squad-go-review-analysis.txt"

  run:go-tests:
    desc: "Run the go-tests agent to autonomously increase test coverage to a target"
    silent: true
    vars:
      COVERAGE_TARGET: '{{.COVERAGE_TARGET | default "75"}}'
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Get this codebase to {{.COVERAGE_TARGET}}% test coverage.

        Start by measuring current coverage with 'go test ./... -coverprofile=coverage.out -count=1'.
        Analyze gaps with 'go tool cover -func=coverage.out'.
        Prioritize packages by impact — most uncovered statements first.
        Write tests for each priority package, verify they pass, and iterate.

        Target: {{.COVERAGE_TARGET}}% total coverage.
        Use table-driven tests ([]struct + t.Run) for any function with 2+ test cases.
        Only create or modify _test.go files. Never edit source code.
        TEST FILE NAMING: Strict 1:1 mapping — foo.go gets foo_test.go. Never create
        _extra_test.go, _coverage_test.go, or any *_<suffix>_test.go variant.

        BUDGET: You have 200 iterations. Use Write (not Edit) for new files.
        Cap 20 iterations per package. Wind down early if needed — a partial
        report with before/after numbers is better than no report.

        COVERAGE MEASUREMENT: Always use 'go tool cover -func=coverage.out | tail -1'
        for total coverage. Never parse coverage.out manually with awk or read it raw.
        One command, one iteration." \
          --agent go-tests \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --max-iterations 200 \
          --out {{.OUT_DIR}}/squad-go-tests.txt
      - echo "Test coverage output written to {{.OUT_DIR}}/squad-go-tests.txt"
      - |
        echo ""
        echo "Running final verification..."
      - cd {{.WORKING_DIR}} && go test ./...
      - echo "go test ./... PASSED"

  run:go-tests-analyze:
    desc: "Run the go-tests agent in readonly mode to analyze coverage gaps without writing tests"
    silent: true
    vars:
      COVERAGE_TARGET: '{{.COVERAGE_TARGET | default "75"}}'
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Analyze this codebase's test coverage gaps. Target is {{.COVERAGE_TARGET}}%.

        Measure current coverage, identify gaps, classify functions as testable vs
        needing refactor, and produce a prioritized report of what to test first.

        Do NOT write or modify any files." \
          --agent go-tests --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out {{.OUT_DIR}}/squad-go-tests-analysis.txt
      - echo "Coverage analysis written to {{.OUT_DIR}}/squad-go-tests-analysis.txt"

  run:go-cobra:
    desc: "Run the go-cobra agent to autonomously fix Cobra/Viper best-practice violations"
    silent: true
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Review and fix all Cobra/Viper best-practice violations in this codebase.

        Start by using Glob with '**/*.go' to discover all Go source files.
        Read each file in cmd/ and internal/ that imports cobra or viper.
        Cross-reference between files for integration issues.
        Apply fixes via Edit tool, highest severity first.
        Run 'go build ./...' after each batch of edits.

        IMPORTANT CONSTRAINTS (repeat from system prompt):
        - Only modify files in cmd/ and internal/
        - No cosmetic changes (doc comments, import ordering, naming style)
        - No new dependencies
        - Skip fixes needing 50+ lines or new files
        - Preserve backwards compatibility — no flag renames or removals
        - Every file touched must appear in the output report" \
          --agent go-cobra \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --out {{.OUT_DIR}}/squad-go-cobra.txt
      - echo "Cobra review output written to {{.OUT_DIR}}/squad-go-cobra.txt"
      - |
        echo ""
        echo "Running final verification..."
      - go build ./...
      - echo "go build ./... PASSED"

  run:go-cobra-analyze:
    desc: "Run the go-cobra agent in readonly mode to analyze Cobra/Viper violations without applying fixes"
    silent: true
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Analyze this codebase for Cobra/Viper best-practice violations.

        Use Glob with '**/*.go' to discover all Go source files.
        Read each file in cmd/ and internal/ that imports cobra or viper.
        Cross-reference between files for integration issues.
        Produce a prioritized report of all findings.

        Do NOT write or modify any files." \
          --agent go-cobra --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out {{.OUT_DIR}}/squad-go-cobra-analysis.txt
      - echo "Cobra analysis written to {{.OUT_DIR}}/squad-go-cobra-analysis.txt"

  run:go-doc-comments:
    desc: "Run the go-doc-comments agent to autonomously add/improve Go doc comments"
    silent: true
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Add or improve doc comments on all exported Go declarations in this codebase.

        Start by using Glob with '**/*.go' to discover all Go source files.
        Read each file (skip _test.go and vendor/).
        Catalog every exported declaration that is missing a doc comment or has a deficient one.
        Apply fixes via Edit tool, highest priority first.
        Run 'go build ./...' after each batch of edits.

        IMPORTANT CONSTRAINTS (repeat from system prompt):
        - ONLY modify doc comments — never change code logic, signatures, or imports
        - Start every comment with the declared name (godoc indexes by first word)
        - No blank line between comment and declaration (godoc drops these)
        - Complete sentences with proper punctuation
        - Focus on WHAT, not HOW — no implementation details
        - No redundant comments ('Process processes the data' = skip)
        - SKIP trivial wrappers: Info/Warn/Debug/Error on loggers, simple setters, delegation functions
        - Key test: 'Does this comment tell the reader something the name does not?' If no → skip
        - Boolean functions use 'reports whether' (fix EXISTING 'returns true' comments too)
        - Grep for 'returns true' in existing comments — these are format violations to fix
        - Proportional: one-line getter = one-line comment, trivial = NO comment
        - Exported declarations only — skip unexported names
        - Read each file ONCE, catalog all findings, then fix — target ≤15 iterations
        - Use ONE Grep/Glob on repo root, not per-directory — minimize tool calls
        - After go build passes, emit report IMMEDIATELY — no post-fix exploration
        - Every file touched must appear in the output report" \
          --agent go-doc-comments \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --out {{.OUT_DIR}}/squad-go-doc-comments.txt
      - echo "Doc comments output written to {{.OUT_DIR}}/squad-go-doc-comments.txt"
      - |
        echo ""
        echo "Running final verification..."
      - cd {{.WORKING_DIR}} && go build ./...
      - echo "go build ./... PASSED"

  run:go-doc-comments-analyze:
    desc: "Run the go-doc-comments agent in readonly mode to analyze doc comment gaps without applying fixes"
    silent: true
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Analyze this codebase for missing or deficient Go doc comments.

        Use Glob with '**/*.go' to discover all Go source files.
        Read each file (skip _test.go and vendor/).
        Catalog every exported declaration that needs a doc comment.
        Produce a prioritized report of all findings.

        Do NOT write or modify any files." \
          --agent go-doc-comments --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out {{.OUT_DIR}}/squad-go-doc-comments-analysis.txt
      - echo "Doc comments analysis written to {{.OUT_DIR}}/squad-go-doc-comments-analysis.txt"

  run:go-security-audit:
    desc: "Run the go-security-audit agent to autonomously fix Go security vulnerabilities"
    silent: true
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Audit and fix all security vulnerabilities in this Go codebase.

        Start by using Glob with '**/*.go' to discover all Go source files.
        Read each file (skip _test.go and vendor/).
        Read go.mod for dependency and Go version info.
        Cross-reference between files for inconsistent security practices.
        Apply fixes via Edit tool, highest severity first.
        Run 'go build ./...' after each batch of edits.

        IMPORTANT CONSTRAINTS (repeat from system prompt):
        - SECURITY FOCUS ONLY — skip code quality, doc comments, naming style
        - No new dependencies
        - Skip fixes needing 50+ lines or new files
        - Preserve backwards compatibility — no API surface changes
        - NEVER change functions whose behavior is asserted by tests
        - NEVER remove intentional panic() calls — they are precondition guards
        - Every fix must be PROPORTIONAL — ask 'could an attacker exploit this?'
        - Theoretical vulnerabilities in internal-only code are INFO, not fixes
        - No false positives — every finding must reference actual code with file:line
        - Include CWE IDs where applicable
        - Read each file ONCE, catalog all findings, then fix — target ≤12 iterations
        - Batch ALL edits for the same file in one iteration — do NOT make separate Edit calls
        - ALWAYS pass glob='*.go' when using Grep — NEVER grep without a glob filter
        - NEVER fall back to per-directory Grep calls — that wastes iterations
        - If Grep fails with 'token too long', skip it and use your Read-phase notes
        - STOP after go build + go test BOTH pass — emit report IMMEDIATELY in the SAME response
        - Do NOT re-read files after verification — no nl, sed, cat, Bash, Grep after tests pass
        - Every file touched must appear in the output report" \
          --agent go-security-audit \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --out {{.OUT_DIR}}/squad-go-security-audit.txt
      - echo "Security audit output written to {{.OUT_DIR}}/squad-go-security-audit.txt"
      - |
        echo ""
        echo "Running final verification..."
      - go build ./...
      - echo "go build ./... PASSED"

  run:go-security-audit-analyze:
    desc: "Run the go-security-audit agent in readonly mode to analyze security without applying fixes"
    silent: true
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Analyze this Go codebase for security vulnerabilities.

        Use Glob with '**/*.go' to discover all Go source files.
        Read each file (skip _test.go and vendor/).
        Read go.mod for dependency and Go version info.
        Cross-reference between files for inconsistent security practices.
        Produce a prioritized report of all security findings.

        SECURITY FOCUS ONLY — skip code quality, doc comments, naming style.
        No false positives — every finding must reference actual code.
        Include CWE IDs where applicable.
        Read each file ONCE, batch 4-6 Read calls per iteration — target ≤12 iterations.
        ALWAYS pass glob='*.go' when using Grep — NEVER grep without a glob filter.
        NEVER fall back to per-directory Grep calls — that wastes iterations.
        After analysis, emit report IMMEDIATELY — no re-reading files.

        Do NOT write or modify any files." \
          --agent go-security-audit --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out {{.OUT_DIR}}/squad-go-security-audit-analysis.txt
      - echo "Security audit analysis written to {{.OUT_DIR}}/squad-go-security-audit-analysis.txt"

  run:go-taskfile:
    desc: "Run the go-taskfile agent to autonomously fix Taskfile.yaml best-practice violations"
    silent: true
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Review and fix all Taskfile.yaml best-practice violations in this codebase.

        Start by using Glob with '**/Taskfile.yaml' and '**/Taskfile.yml' to discover all Taskfiles.
        Read each Taskfile to understand structure and conventions.
        Cross-reference between files for include and variable consistency.
        Apply fixes via Edit tool, highest severity first.
        Run 'task --list' after each batch of edits.

        IMPORTANT CONSTRAINTS (repeat from system prompt):
        - No cosmetic changes (comment style, whitespace, task ordering)
        - Skip fixes needing restructuring of 3+ tasks or new includes
        - Preserve backwards compatibility — no task renames without noting breaking change
        - NEVER add hardcoded secrets — use environment variables with no default
        - Every fix must be PROPORTIONAL — no complex preconditions for trivial edge cases
        - Path traversal validation: ONLY add for variables with NO default or unsafe defaults.
          Skip for variables with safe defaults like /tmp — local task runners don't need it
        - Read each file ONCE, catalog all findings, then fix — target ≤10 iterations
        - Use ONE Glob on repo root, not per-directory — minimize tool calls
        - After task --list passes, emit report IMMEDIATELY — no post-fix exploration
        - Every file touched must appear in the output report" \
          --agent go-taskfile \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --out {{.OUT_DIR}}/squad-go-taskfile.txt
      - echo "Taskfile review output written to {{.OUT_DIR}}/squad-go-taskfile.txt"
      - |
        echo ""
        echo "Running final verification..."
      - task --list
      - echo "task --list PASSED"

  run:go-taskfile-analyze:
    desc: "Run the go-taskfile agent in readonly mode to analyze Taskfile violations without applying fixes"
    silent: true
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Analyze this codebase for Taskfile.yaml best-practice violations.

        Use Glob with '**/Taskfile.yaml' and '**/Taskfile.yml' to discover all Taskfiles.
        Read each file to understand structure and conventions.
        Cross-reference between files for include and variable consistency.
        Produce a prioritized report of all findings.

        No cosmetic findings — skip comment style, whitespace, task ordering.
        No false positives — every finding must reference actual file and line.
        Flag security issues (hardcoded secrets, unvalidated input) as CRITICAL.
        Path traversal: ONLY flag for variables with NO default or unsafe defaults.
        Skip for variables with safe defaults like /tmp — proportionality applies.
        Read each file ONCE — target ≤10 iterations.
        After analysis, emit report IMMEDIATELY — no re-reading files.

        Do NOT write or modify any files." \
          --agent go-taskfile --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out {{.OUT_DIR}}/squad-go-taskfile-analysis.txt
      - echo "Taskfile analysis written to {{.OUT_DIR}}/squad-go-taskfile-analysis.txt"

  run:python-review:
    desc: "Run the python-review agent to autonomously fix Python code quality issues"
    silent: true
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Review and fix all Python code quality issues in this codebase.

        Start by using Glob with '**/*.py' to discover all Python source files.
        Batch Read calls: read 4-6 files per iteration. Do NOT read one file per iteration.
        Cross-reference between files for consistency issues.
        Apply fixes via Edit tool, highest severity first.
        Run 'ruff check .' after edits. If ruff is NOT installed, use py_compile only.

        ANALYSIS CHECKLIST (check each file for these):
        - Method calls self.x() — is the method actually defined? (CRITICAL if not)
        - Every name used — is it imported or defined? (CRITICAL if missing import)
        - if/else branches — do they do different things or identical code? (HIGH if dead code)
        - HTTP calls — inside context managers? (HIGH if httpx.get without Client())
        - Public functions — return type annotations? (but NEVER add -> None, it's inferable)

        PRIORITY (mandatory order):
        - Fix ALL CRITICAL before ANY HIGH. Fix ALL HIGH before ANY MEDIUM.
        - Do NOT skip CRITICAL/HIGH to fix easier MEDIUM issues.

        CONSTRAINTS:
        - No cosmetic changes (docstrings, import ordering, naming style)
        - No new dependencies
        - Skip fixes needing 50+ lines or new files
        - Preserve backwards compatibility — no API surface changes
        - NEVER change functions whose behavior is asserted by tests (pytest.raises)
        - NEVER remove intentional raise statements — they are precondition guards
        - Every fix must be PROPORTIONAL — no micro-optimizations for small loops
        - NEVER change identifier/correlation ID assignments (job_id=x.project may be intentional)
        - When fixing UnboundLocalError, use None as fallback, NOT another variable's value
        - Flag inconsistent imports (e.g. print() when codebase uses logging)
        - NEVER add -> None return annotations — they are always inferable

        ITERATION BUDGET — scales with codebase size (count after Glob):
        - Small (≤20 files): 12 iterations max
        - Medium (21-50 files): 20 iterations max
        - Large (50+ files): 25 iterations max

        Phase allocation:
        - Phase 1 (1 iter): Glob + Read reference in parallel, COUNT source files
        - Phase 2 (varies): Read files with 6-10 parallel Reads per iteration
          - Small: 2-3 iters to read ALL
          - Medium: 4-5 iters to read ALL
          - Large: prioritize entry points + core modules
        - Phase 3 (2-4 iter): ALL Edit calls batched (10 fixes = 10 Edit calls in ONE response)
        - Phase 4 (1 iter): Verify + report in SAME response

        Do NOT hardcode directory names like app/, src/, lib/ — use Glob output.
        COVERAGE IS MANDATORY for small/medium. For large codebases, document sampling.

        HARD REQUIREMENTS:
        - Do NOT read one file per iteration — batch 6-10 Read calls per iteration
        - Do NOT edit-wait-edit-wait — batch ALL edits into ONE iteration
        - Do NOT re-read files after editing — trust Edit output
        - STOP after verification — emit report in SAME response, NO more iterations
        - If ruff not installed, proceed with py_compile only
        - Every file touched must appear in the output report" \
          --agent python-review \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --out {{.OUT_DIR}}/squad-python-review.txt
      - echo "Python review output written to {{.OUT_DIR}}/squad-python-review.txt"
      - |
        echo ""
        echo "Running final verification..."
      - cd {{.WORKING_DIR}} && ruff check . || true
      - echo "Verification complete"

  run:python-review-analyze:
    desc: "Run the python-review agent in readonly mode to analyze Python code quality without applying fixes"
    silent: true
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Analyze this codebase for Python code quality issues.

        Use Glob with '**/*.py' to discover all Python source files.
        Batch Read calls: read 4-6 files per iteration. Do NOT read one file per iteration.
        Cross-reference between files for consistency issues.
        Produce a prioritized report of all findings.

        ANALYSIS CHECKLIST (check each file for these):
        - Method calls self.x() — is the method actually defined? (CRITICAL if not)
        - Every name used — is it imported or defined? (CRITICAL if missing import)
        - if/else branches — do they do different things or identical code? (HIGH if dead code)
        - HTTP calls — inside context managers? (HIGH if httpx.get without Client())
        - Public functions — return type annotations? (but NEVER add -> None, it's inferable)

        SEVERITY GUIDE:
        - CRITICAL: syntax errors, undefined methods, missing imports, bare except, mutable defaults
        - HIGH: broad except, resource leaks, missing type annotations, dead code, fire-and-forget
        - MEDIUM: print() instead of logging, legacy type syntax, inconsistent styles

        No cosmetic findings — skip docstrings, import ordering, naming style.
        No false positives — every finding must reference actual file and line.

        ITERATION BUDGET — scales with codebase size (count after Glob):
        - Small (≤20 files): 12 iterations max
        - Medium (21-50 files): 20 iterations max
        - Large (50+ files): 25 iterations max

        EFFICIENCY (must follow):
        - Batch reads: 6-10 files per iteration, not one file per iteration
        - Do NOT hardcode directory names like app/, src/ — use Glob output
        - Small/medium: read ALL files. Large: prioritize entry points + core modules
        - Use ONE Grep/Glob on repo root — do NOT run per-directory searches
        - After analysis is complete, emit report IMMEDIATELY — no re-reading files

        Do NOT write or modify any files." \
          --agent python-review --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out {{.OUT_DIR}}/squad-python-review-analysis.txt
      - echo "Python review analysis written to {{.OUT_DIR}}/squad-python-review-analysis.txt"

  run:python-tests:
    desc: "Run the python-tests agent to autonomously increase Python test coverage"
    silent: true
    vars:
      COVERAGE_TARGET: '{{.COVERAGE_TARGET | default "75"}}'
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Get this Python codebase to {{.COVERAGE_TARGET}}% test coverage.

        Start by running Glob **/*.py AND checking pytest-cov in parallel.
        If pytest-cov available, measure baseline with 'pytest --cov=<pkg> --cov-branch --cov-report=term-missing -q || true'
        where <pkg> is the source package discovered from Glob (e.g., app, src). 0% is fine if no tests exist.
        Use Glob **/*.py to discover all source files. Filter out __pycache__, .venv, test_*.py.
        Prioritize modules by impact — most functions/classes first.
        Write tests for each priority module, verify they pass, and iterate.

        Target: {{.COVERAGE_TARGET}}% total coverage.
        Use @pytest.mark.parametrize for any function with 2+ test cases.
        Only create or modify test_*.py files. Never edit source code.
        TEST FILE LOCATION: ALWAYS place tests in tests/ directory. Create tests/ if it
        does not exist. Mirror source structure: <pkg>/tasks/foo.py → tests/tasks/test_foo.py.
        Discover actual source dir from Glob (could be src/, app/, lib/, or package name).

        MOCK STRATEGY:
        - Mock HTTP clients (httpx, requests) with unittest.mock.patch
        - Mock file I/O by using tmp_path fixture
        - Mock time with freezegun or mock time.time()
        - Do NOT mock internal classes — test through public API

        CONFTEST.PY STRUCTURE (CRITICAL):
        - sys.modules stubs MUST be at MODULE LEVEL (top of file), NOT inside fixtures
        - Reason: pytest imports conftest.py BEFORE collecting test files
        - If stubs are in fixtures, test imports fail with ModuleNotFoundError
        - Pattern: sys.modules stubs at top, then pytest import, then fixtures

        ASYNC TESTS:
        - Use @pytest.mark.asyncio for async functions
        - If pytest-asyncio not available, note in report and skip async tests

        ITERATION BUDGET (CRITICAL — do NOT exceed):
        - Small codebase (≤15 source files): 15 iterations MAX
        - Medium (16-30 files): 25 iterations MAX
        - Large (30+ files): 35 iterations MAX

        WRITE EARLY — CRITICAL FOR REASONING MODELS:
        Do NOT read all files before writing. Interleave reading and writing:
        - Iter 1: Glob + coverage measurement
        - Iter 2: Read 2-3 source files + pyproject.toml
        - Iter 3: Write tests for those files (use Write, not Edit)
        - Iter 4: Read 2-3 more source files
        - Iter 5: Write tests for those
        - Repeat until done, then verify + report

        Reasoning models (o1, o3, codex) can exhaust output tokens if they think
        about too many files before acting. ACT QUICKLY — produce Write calls early.

        PYTEST BUDGET: 2 RUNS MAXIMUM (HARD LIMIT)
        - Run #1: After writing ALL test files
        - Run #2: After fixing ALL failures in ONE iteration
        - Running pytest more than twice = FAILURE. Count your pytest runs.

        HARD EFFICIENCY REQUIREMENTS:
        - INTERLEAVE reads and writes: Read 2-3 → Write multiple files → Read 2-3 → Write
        - ALWAYS use Write, NEVER use Edit. Edit is FORBIDDEN for test files.
        - Write MULTIPLE test files per iteration using parallel Write calls.
        - If pytest fails, fix ALL failing files in ONE iteration (parallel Write).
        - STOP after pytest passes — emit report in SAME response.

        COVERAGE MEASUREMENT: Use 'pytest --cov=<pkg> --cov-branch --cov-report=term-missing -q || true'.
        Branch coverage is more meaningful than line coverage. Parse the TOTAL line.
        If pytest-cov not installed, use basic pytest.

        MOCKING: Always use autospec=True when patching. Use AsyncMock for async functions.

        REPORT REQUIREMENTS (mandatory):
        - Coverage Report section with Before/After/Delta
        - Modules Tested table
        - Tests Written with descriptions
        - Skipped Functions with reasons
        - Files Touched listing all test_*.py files
        - Validation with pytest results" \
          --agent python-tests \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --max-iterations 200 \
          --out {{.OUT_DIR}}/squad-python-tests.txt
      - echo "Python test coverage output written to {{.OUT_DIR}}/squad-python-tests.txt"
      - |
        echo ""
        echo "Running final verification..."
      - cd {{.WORKING_DIR}} && pytest -v || true
      - echo "pytest PASSED"

  run:python-tests-analyze:
    desc: "Run the python-tests agent in readonly mode to analyze coverage gaps without writing tests"
    silent: true
    vars:
      COVERAGE_TARGET: '{{.COVERAGE_TARGET | default "75"}}'
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Analyze this Python codebase's test coverage gaps. Target is {{.COVERAGE_TARGET}}%.

        Measure current coverage with pytest-cov if available.
        Identify gaps, classify functions as testable vs needing refactor,
        and produce a prioritized report of what to test first.

        For each uncovered function, determine:
        - Testable: can mock external deps
        - Needs refactor: requires source changes (note why)
        - Skip: trivial code not worth testing

        Include mocking strategy recommendations for each testable function.
        Note async functions that need pytest-asyncio.
        Read each file ONCE, batch 4-6 Read calls per iteration.
        Budget: ≤15 iterations for small codebases, ≤25 for medium/large.

        Do NOT write or modify any files." \
          --agent python-tests --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out {{.OUT_DIR}}/squad-python-tests-analysis.txt
      - echo "Python coverage analysis written to {{.OUT_DIR}}/squad-python-tests-analysis.txt"

  clean:
    desc: Clean build artifacts and temp files
    cmds:
      - task: go:clean
      - rm -f {{.OUT_DIR}}/squad-*.txt
