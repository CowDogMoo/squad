---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  BINARY_NAME: squad
  CMD_PATH: ./cmd/squad

  # Provider configuration
  PROVIDER: '{{.PROVIDER | default "ollama"}}'
  BASE_URL: '{{.BASE_URL | default ""}}'
  MODEL: '{{.MODEL | default "qwen3-coder:30b"}}'
  API_KEY: '{{.API_KEY | default "ollama"}}'

  # Agent configuration
  AGENT: '{{.AGENT | default "go-cobra"}}'
  WORKING_DIR: '{{.WORKING_DIR | default "."}}'
  OUT: '{{.OUT | default "/tmp/squad-response.txt"}}'

  # Judge pipeline configuration
  NUM_WORKERS: '{{.NUM_WORKERS | default "3"}}'
  REVIEW_TARGET: '{{.REVIEW_TARGET | default "cmd/squad/tools.go"}}'

  # Internal: conditionally include --base-url flag
  _BASE_URL_FLAG: '{{if .BASE_URL}}--base-url {{.BASE_URL}}{{end}}'

includes:
  go:
    taskfile: "https://raw.githubusercontent.com/CowDogMoo/taskfile-templates/main/go/Taskfile.yaml"
    vars:
      BINARY_NAME: squad
      CMD_PATH: ./cmd/squad
  pre-commit:
    taskfile: "https://raw.githubusercontent.com/CowDogMoo/taskfile-templates/main/pre-commit/Taskfile.yaml"

tasks:
  default:
    desc: Build, test, and clean
    cmds:
      - task: go:default

  run:
    desc: "Run an agent with a prompt (usage: task run PROMPT='your prompt here')"
    silent: true
    vars:
      PROMPT: '{{.PROMPT | default ""}}'
    preconditions:
      - sh: test -n "{{.PROMPT}}"
        msg: "PROMPT is required. Usage: task run PROMPT='your prompt here'"
    cmds:
      - |
        go run ./cmd/squad run -v \
          "{{.PROMPT}}" \
          --agent {{.AGENT}} \
          --working-dir {{.WORKING_DIR}} \
          --api-key {{.API_KEY}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --out {{.OUT}}

  run:go-review:
    desc: Run the go-review agent to review Go code quality
    silent: true
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Review cmd/squad/tools.go for Go best practices. Use Read to inspect the file, then provide a structured review. If you find issues, use the Edit tool to fix them. Run 'go build ./...' after edits to verify." \
          --agent go-review \
          --working-dir {{.WORKING_DIR}} \
          --api-key {{.API_KEY}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --out /tmp/squad-go-review.txt
      - echo "Review written to /tmp/squad-go-review.txt"

  run:judge-review:
    desc: "Multi-run judge pipeline: N workers review in parallel, judge applies consensus fixes"
    silent: true
    cmds:
      - rm -f /tmp/squad-worker-*.txt /tmp/squad-judge.txt /tmp/squad-workers-combined.txt
      - task: _run-workers
      - |
        # Check quorum: at least 2 workers must have produced usable output
        count=0
        for i in $(seq 1 {{.NUM_WORKERS}}); do
          if [ -s "/tmp/squad-worker-${i}.txt" ]; then
            findings=$(grep -c '^\*\*Severity:\*\*\|^### ' "/tmp/squad-worker-${i}.txt" 2>/dev/null || echo 0)
            if [ "$findings" -ge 2 ]; then
              count=$((count + 1))
            else
              echo "WARNING: Worker ${i} output has fewer than 2 findings — excluding from quorum."
            fi
          fi
        done
        if [ "$count" -lt 2 ]; then
          echo "ERROR: Only ${count} worker(s) produced usable output. Need at least 2 for quorum."
          exit 1
        fi
        echo "Quorum met: ${count}/{{.NUM_WORKERS}} workers produced usable output."
      - task: _run-judge
      - |
        echo ""
        echo "=== Pipeline complete ==="
        echo "Worker outputs: /tmp/squad-worker-{1..{{.NUM_WORKERS}}}.txt"
        echo "Judge output:   /tmp/squad-judge.txt"
        echo ""
        echo "Running build verification..."
      - go build ./...
      - echo "go build ./... PASSED"

  _run-workers:
    desc: "Internal: spawn N review workers in parallel"
    internal: true
    silent: true
    cmds:
      - |
        echo "Starting {{.NUM_WORKERS}} review workers in parallel..."
        pids=""
        for i in $(seq 1 {{.NUM_WORKERS}}); do
          (
            go run ./cmd/squad run -v \
              "Review {{.REVIEW_TARGET}} using ALL 12 review categories from go-review-criteria.md.

        For each category, Read the file and check for issues. You MUST use the Read tool and Grep tool to inspect the actual code — do not guess.

        Report every finding with: severity, category, file, line number, description, and suggested fix. If a category has no issues, skip it.

        Do NOT edit any files. Do NOT use the Edit or Write tools." \
              --agent go-review --mode readonly \
              --working-dir {{.WORKING_DIR}} \
              --api-key {{.API_KEY}} \
              --provider {{.PROVIDER}} \
              {{._BASE_URL_FLAG}} \
              --model {{.MODEL}} \
              --require-actionable=false \
              --temperature 0.7 \
              --out "/tmp/squad-worker-${i}.txt" \
              --print=false \
              2>"/tmp/squad-worker-${i}.log"
            echo "Worker ${i} finished."
          ) &
          pids="${pids} $!"
        done
        echo "Waiting for all workers to complete... (logs: /tmp/squad-worker-{1..{{.NUM_WORKERS}}}.log)"
        for pid in ${pids}; do
          wait ${pid} 2>/dev/null || true
        done
        echo "All workers complete."
        for i in $(seq 1 {{.NUM_WORKERS}}); do
          if [ -s "/tmp/squad-worker-${i}.txt" ]; then
            lines=$(wc -l < "/tmp/squad-worker-${i}.txt")
            findings=$(grep -c '^\*\*Severity:\*\*\|^### ' "/tmp/squad-worker-${i}.txt" 2>/dev/null || echo 0)
            echo "  Worker ${i}: ${lines} lines, ${findings} findings"
            if [ "$findings" -lt 2 ]; then
              echo "  Worker ${i}: WARNING — fewer than 2 findings, output may be low quality"
            fi
          else
            echo "  Worker ${i}: EMPTY (failed)"
          fi
        done

  _run-judge:
    desc: "Internal: combine worker outputs and run judge agent"
    internal: true
    silent: true
    cmds:
      - |
        echo "Combining worker outputs for judge..."
        > /tmp/squad-workers-combined.txt
        for i in $(seq 1 {{.NUM_WORKERS}}); do
          if [ -s "/tmp/squad-worker-${i}.txt" ]; then
            echo "--- WORKER ${i} ---" >> /tmp/squad-workers-combined.txt
            cat "/tmp/squad-worker-${i}.txt" >> /tmp/squad-workers-combined.txt
            echo "" >> /tmp/squad-workers-combined.txt
          fi
        done
        echo "Running judge agent..."
        WORKER_CONTENT=$(cat /tmp/squad-workers-combined.txt)
        go run ./cmd/squad run -v \
          "You are judging {{.NUM_WORKERS}} independent reviews of {{.REVIEW_TARGET}}.

        Here are the worker outputs:

        ${WORKER_CONTENT}

        Now read {{.REVIEW_TARGET}} yourself, tally findings across workers, validate each finding against the actual code, apply consensus fixes per your severity gating rules, verify with 'go build ./...', and produce your judge report.

        IMPORTANT: Doc comments, import ordering, and pure whitespace changes are NOT eligible — skip those. Everything else the workers flagged is fair game if you can verify it and the fix compiles. Apply idiomatic refactors — that is the whole point of this review.

        MANDATORY: If workers flagged 'business logic in cmd/' or 'global mutable flag state', you MUST fix them. Follow the Mandatory Refactor Playbook in your system prompt. Create new packages/files as needed. Do NOT skip for size. Do NOT use internal/ packages." \
          --agent go-review-judge \
          --working-dir {{.WORKING_DIR}} \
          --api-key {{.API_KEY}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --num-ctx 32768 \
          --temperature 0.2 \
          --require-actionable=true \
          --apply \
          --out /tmp/squad-judge.txt
        echo "Judge output written to /tmp/squad-judge.txt"

  run:judge-codebase:
    desc: "Run judge-review pipeline across the entire Go codebase"
    silent: true
    cmds:
      - rm -f /tmp/squad-worker-*.txt /tmp/squad-judge.txt /tmp/squad-workers-combined.txt
      - task: _run-codebase-workers
      - |
        # Check quorum: at least 2 workers must have produced usable output
        count=0
        for i in $(seq 1 {{.NUM_WORKERS}}); do
          if [ -s "/tmp/squad-worker-${i}.txt" ]; then
            findings=$(grep -c '^\*\*Severity:\*\*\|^### ' "/tmp/squad-worker-${i}.txt" 2>/dev/null || echo 0)
            if [ "$findings" -ge 2 ]; then
              count=$((count + 1))
            else
              echo "WARNING: Worker ${i} output has fewer than 2 findings — excluding from quorum."
            fi
          fi
        done
        if [ "$count" -lt 2 ]; then
          echo "ERROR: Only ${count} worker(s) produced usable output. Need at least 2 for quorum."
          exit 1
        fi
        echo "Quorum met: ${count}/{{.NUM_WORKERS}} workers produced usable output."
      - task: _run-codebase-judge
      - |
        echo ""
        echo "=== Codebase Review Complete ==="
        echo "Worker outputs: /tmp/squad-worker-{1..{{.NUM_WORKERS}}}.txt"
        echo "Judge output:   /tmp/squad-judge.txt"
        echo ""
        echo "Running build verification..."
      - go build ./...
      - echo "go build ./... PASSED"

  _run-codebase-workers:
    desc: "Internal: spawn N workers to review entire codebase"
    internal: true
    silent: true
    cmds:
      - |
        echo "Starting {{.NUM_WORKERS}} codebase review workers (agent={{.AGENT}}) in parallel..."
        pids=""
        for i in $(seq 1 {{.NUM_WORKERS}}); do
          (
            go run ./cmd/squad run -v \
              "Review the ENTIRE Go codebase.

        Start by running Glob with pattern '**/*.go' to discover all Go source files. Then Read each file (skip *_test.go files).

        For each file, check for Cobra/Viper best‑practice violations and functional issues against your review criteria. Cross-reference between files — check that types, functions, and interfaces are used correctly across package boundaries.

        Report every finding with: severity, category, file, line number, description, and suggested fix. If a file has no issues, skip it silently.

        Report Cobra/Viper best‑practice violations AND functional issues:
        - Flag binding: flags not bound to Viper, bypassing config precedence
        - Args validators: missing or inadequate
        - MarkFlagRequired: missing where required
        - Command aliases: missing
        - Dynamic completions: missing for flags like --agent, --provider, --model
        - Signal handling: gaps in graceful shutdown
        - Business logic in cmd/: code that should be in internal packages
        - Global mutable flag state: package-level vars for flags
        - Config precedence errors
        - Error handling gaps (missing wrapping, ignored errors)
        - Bugs, incorrect logic, wrong return values

        Do NOT report cosmetic issues (missing doc comments, import ordering, naming style, magic numbers).
        Do NOT edit any files. Do NOT use the Edit or Write tools." \
              --agent {{.AGENT}} --mode readonly \
              --working-dir {{.WORKING_DIR}} \
              --api-key {{.API_KEY}} \
              --provider {{.PROVIDER}} \
              {{._BASE_URL_FLAG}} \
              --model {{.MODEL}} \
              --require-actionable=false \
              --temperature 0.7 \
              --out "/tmp/squad-worker-${i}.txt" \
              --print=false \
              2>"/tmp/squad-worker-${i}.log"
            echo "Worker ${i} finished."
          ) &
          pids="${pids} $!"
        done
        echo "Waiting for all workers to complete... (logs: /tmp/squad-worker-{1..{{.NUM_WORKERS}}}.log)"
        for pid in ${pids}; do
          wait ${pid} 2>/dev/null || true
        done
        echo "All workers complete."
        for i in $(seq 1 {{.NUM_WORKERS}}); do
          if [ -s "/tmp/squad-worker-${i}.txt" ]; then
            lines=$(wc -l < "/tmp/squad-worker-${i}.txt")
            findings=$(grep -c '^\*\*Severity:\*\*\|^### ' "/tmp/squad-worker-${i}.txt" 2>/dev/null || echo 0)
            echo "  Worker ${i}: ${lines} lines, ${findings} findings"
          else
            echo "  Worker ${i}: EMPTY (failed)"
          fi
        done

  _run-codebase-judge:
    desc: "Internal: combine codebase worker outputs and run judge agent"
    internal: true
    silent: true
    cmds:
      - |
        echo "Combining worker outputs for judge..."
        > /tmp/squad-workers-combined.txt
        for i in $(seq 1 {{.NUM_WORKERS}}); do
          if [ -s "/tmp/squad-worker-${i}.txt" ]; then
            echo "--- WORKER ${i} ---" >> /tmp/squad-workers-combined.txt
            cat "/tmp/squad-worker-${i}.txt" >> /tmp/squad-workers-combined.txt
            echo "" >> /tmp/squad-workers-combined.txt
          fi
        done
        echo "Running judge agent..."
        WORKER_CONTENT=$(cat /tmp/squad-workers-combined.txt)
        go run ./cmd/squad run -v \
          "You are judging {{.NUM_WORKERS}} independent reviews of the ENTIRE Go codebase.

        Here are the worker outputs:

        ${WORKER_CONTENT}

        Now use Glob to discover all Go files, Read each one the workers referenced, tally findings across workers, validate each finding against the actual code, apply consensus fixes per your severity gating rules, and produce your judge report.

        Use the Edit tool for every fix. If you make any edits, include a "Files Touched" section. If no edits are made, include a "No changes" section.
        Large refactors are allowed if required to fix consensus findings. You may create new files/packages or move code when needed, but keep changes idiomatic and ensure the build passes.

        IMPORTANT: Doc comments, import ordering, and pure whitespace changes are NOT eligible — skip those. Everything else the workers flagged is fair game if you can verify it and the fix compiles. Apply idiomatic refactors — that is the whole point of this review.

        MANDATORY: If workers flagged 'business logic in cmd/' or 'global mutable flag state', you MUST fix them. Do NOT skip by labeling them 'architectural' or 'too large'. Follow the Mandatory Refactor Playbook in your system prompt. Do global-flag-state first, then business-logic extraction. Create new packages/files as needed. Do NOT use internal/ packages." \
          --agent go-review-judge \
          --working-dir {{.WORKING_DIR}} \
          --api-key {{.API_KEY}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --num-ctx 32768 \
          --temperature 0.2 \
          --require-actionable=true \
          --apply \
          --out /tmp/squad-judge.txt
        echo "Judge output written to /tmp/squad-judge.txt"

  _run-scoped-judge:
    desc: "Internal: combine worker outputs and run judge with a scoped mode"
    internal: true
    silent: true
    vars:
      SCOPE_MODE: '{{.SCOPE_MODE}}'
      SCOPE_PROMPT: '{{.SCOPE_PROMPT}}'
    cmds:
      - |
        echo "Combining worker outputs for scoped judge (mode={{.SCOPE_MODE}})..."
        > /tmp/squad-workers-combined.txt
        for i in $(seq 1 {{.NUM_WORKERS}}); do
          if [ -s "/tmp/squad-worker-${i}.txt" ]; then
            echo "--- WORKER ${i} ---" >> /tmp/squad-workers-combined.txt
            cat "/tmp/squad-worker-${i}.txt" >> /tmp/squad-workers-combined.txt
            echo "" >> /tmp/squad-workers-combined.txt
          fi
        done
        echo "Running judge agent (mode={{.SCOPE_MODE}})..."
        WORKER_CONTENT=$(cat /tmp/squad-workers-combined.txt)
        go run ./cmd/squad run -v \
          "You are judging {{.NUM_WORKERS}} independent reviews of the ENTIRE Go codebase.

        Here are the worker outputs:

        ${WORKER_CONTENT}

        Now use Glob to discover all Go files, Read each one the workers referenced, tally findings across workers, validate each finding against the actual code, apply consensus fixes per your severity gating rules, and produce your judge report.

        Use the Edit tool for every fix. If you make any edits, include a 'Files Touched' section. If no edits are made, include a 'No changes' section.

        {{.SCOPE_PROMPT}}" \
          --agent go-review-judge --mode {{.SCOPE_MODE}} \
          --working-dir {{.WORKING_DIR}} \
          --api-key {{.API_KEY}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --num-ctx 32768 \
          --temperature 0.2 \
          --require-actionable=false \
          --out /tmp/squad-judge.txt
        echo "Judge output written to /tmp/squad-judge.txt"
        # Validate that the judge produced actionable output
        has_files_touched=$(grep -qi 'files touched' /tmp/squad-judge.txt && echo yes || echo no)
        has_no_changes=$(grep -qi 'no changes' /tmp/squad-judge.txt && echo yes || echo no)
        if [ "$has_files_touched" = "yes" ]; then
          echo "Judge made edits (Files Touched found)."
        elif [ "$has_no_changes" = "yes" ]; then
          if [ "{{.SCOPE_MODE}}" = "phase-flags" ]; then
            echo "Judge reported 'No changes' — allowing for Phase A if checks pass."
          else
            echo "ERROR: Judge reported 'No changes' — expected edits for this phase."
            exit 1
          fi
        else
          echo "ERROR: Judge output missing both 'Files Touched' and 'No changes' — invalid report."
          exit 1
        fi
        # Phase A validation: ensure global flag vars are removed
        if [ "{{.SCOPE_MODE}}" = "phase-flags" ]; then
          if rg -n "run[A-Za-z0-9_]+\\s+(string|int|bool|float64)" cmd/squad/run.go >/dev/null 2>&1; then
            echo "ERROR: Phase A check failed — run* global vars still declared in cmd/squad/run.go"
            exit 1
          fi
          if rg -n "(StringVar|BoolVar|IntVar|Float64Var)\\(&run" cmd/squad/run.go >/dev/null 2>&1; then
            echo "ERROR: Phase A check failed — flags still bound to run* globals in cmd/squad/run.go"
            exit 1
          fi
          echo "Phase A check passed — no run* global var block found."
        fi
        # Phase B validation: ensure real extraction occurred (not a stub)
        if [ "{{.SCOPE_MODE}}" = "phase-extract" ]; then
          if [ ! -d runner ]; then
            echo "ERROR: Phase B check failed — expected runner/ package to exist."
            exit 1
          fi
          if [ ! -s runner/run.go ]; then
            echo "ERROR: Phase B check failed — runner/run.go is missing."
            exit 1
          fi
          if rg -n "TODO: full content omitted" runner/run.go >/dev/null 2>&1; then
            echo "ERROR: Phase B check failed — runner/run.go is a stub."
            exit 1
          fi
          if ! rg -n "func ExecuteRun\\(" runner/run.go >/dev/null 2>&1; then
            echo "ERROR: Phase B check failed — runner.ExecuteRun not found."
            exit 1
          fi
          if rg -n "func (executeRun|prepareBundle|invokeModel|applyUnifiedDiff|extractUnifiedDiff|validateActionableResponse)" cmd/squad/run.go >/dev/null 2>&1; then
            echo "ERROR: Phase B check failed — business logic still present in cmd/squad/run.go"
            exit 1
          fi
          echo "Phase B check passed — business logic moved out of cmd/squad/run.go."
        fi

  run:refactor-flags:
    desc: "Phase A: Refactor global mutable flag state only"
    silent: true
    cmds:
      - rm -f /tmp/squad-worker-*.txt /tmp/squad-judge.txt /tmp/squad-workers-combined.txt
      - task: _run-codebase-workers
      - |
        count=0
        for i in $(seq 1 {{.NUM_WORKERS}}); do
          if [ -s "/tmp/squad-worker-${i}.txt" ]; then
            findings=$(grep -c '^\*\*Severity:\*\*\|^### ' "/tmp/squad-worker-${i}.txt" 2>/dev/null || echo 0)
            if [ "$findings" -ge 2 ]; then
              count=$((count + 1))
            else
              echo "WARNING: Worker ${i} output has fewer than 2 findings — excluding from quorum."
            fi
          fi
        done
        if [ "$count" -lt 2 ]; then
          echo "ERROR: Only ${count} worker(s) produced usable output. Need at least 2 for quorum."
          exit 1
        fi
        echo "Quorum met: ${count}/{{.NUM_WORKERS}} workers produced usable output."
      - task: _run-scoped-judge
        vars:
          SCOPE_MODE: phase-flags
          SCOPE_PROMPT: "Focus ONLY on global mutable flag state. Follow the Mandatory Refactor Playbook for flag state. IGNORE all other findings including business-logic extraction, error handling, framework misuse. Skip them with reason 'out of scope for Phase A'. Do NOT use internal/ packages."
      - |
        echo ""
        echo "=== Phase A (Flag State Refactor) Complete ==="
        echo "Judge output: /tmp/squad-judge.txt"
        echo ""
        echo "Running build verification..."
      - go build ./...
      - echo "go build ./... PASSED"

  run:refactor-extract:
    desc: "Phase B: Extract business logic from cmd/ only"
    silent: true
    cmds:
      - rm -f /tmp/squad-worker-*.txt /tmp/squad-judge.txt /tmp/squad-workers-combined.txt
      - task: _run-codebase-workers
      - |
        count=0
        for i in $(seq 1 {{.NUM_WORKERS}}); do
          if [ -s "/tmp/squad-worker-${i}.txt" ]; then
            findings=$(grep -c '^\*\*Severity:\*\*\|^### ' "/tmp/squad-worker-${i}.txt" 2>/dev/null || echo 0)
            if [ "$findings" -ge 2 ]; then
              count=$((count + 1))
            else
              echo "WARNING: Worker ${i} output has fewer than 2 findings — excluding from quorum."
            fi
          fi
        done
        if [ "$count" -lt 2 ]; then
          echo "ERROR: Only ${count} worker(s) produced usable output. Need at least 2 for quorum."
          exit 1
        fi
        echo "Quorum met: ${count}/{{.NUM_WORKERS}} workers produced usable output."
      - task: _run-scoped-judge
        vars:
          SCOPE_MODE: phase-extract
          SCOPE_PROMPT: "Focus ONLY on business logic extraction from cmd/squad/run.go.

        EXACT PATH REQUIREMENT: You MUST create the file runner/run.go (relative to repo root). The package declaration MUST be 'package runner'. Do NOT use pkg/runner, internal/runner, runner/, or any other path. The ONLY acceptable path is runner/run.go.

        Step 1: Read cmd/squad/run.go in full.
        Step 2: Read go.mod to get the module path.
        Step 3: Use the Write tool to create runner/run.go with package runner
        and the COMPLETE bodies of these functions (export each — capitalize first letter):
        executeRun, prepareBundle, invokeModel, handleResponse, callModel,
        callResponsesAPI, callLangChainLLM, buildCallOpts, buildLLM,
        buildOpenAICompatLLM, buildAnthropicLLM, buildNativeOllamaLLM,
        normalizeProvider, isOpenAICompatProvider, applyResponseDiff,
        validateActionableResponse, responseIndicatesNoChanges,
        extractUnifiedDiff, looksLikeDiff, applyUnifiedDiff,
        applyWithGit, applyWithPatch.
        Copy full function bodies — no stubs, no TODOs, no abbreviations.
        Step 4: Edit cmd/squad/run.go to remove those function definitions and update RunE to call runner.ExecuteRun. Add the runner import. Remove unused imports.
        Step 5: Run go build ./... and fix any errors.

        Global flag state is already fixed — do NOT touch it. IGNORE all other findings. Skip them with reason 'out of scope for Phase B'. Do NOT use internal/ packages."
      - |
        echo ""
        echo "=== Phase B (Business Logic Extraction) Complete ==="
        echo "Judge output: /tmp/squad-judge.txt"
        echo ""
        echo "Running build verification..."
      - go build ./...
      - echo "go build ./... PASSED"

  run:refactor-all:
    desc: "Run both refactor phases sequentially: flags first, then extraction"
    silent: true
    cmds:
      - |
        echo "=== Starting Phase A: Global Mutable Flag State ==="
      - task: run:refactor-flags
      - |
        echo ""
        echo "=== Phase A complete. Starting Phase B: Business Logic Extraction ==="
        echo ""
      - task: run:refactor-extract
      - |
        echo ""
        echo "=== Both refactor phases complete ==="

  run:go-tests:
    desc: "Run the go-tests agent to autonomously increase test coverage to a target"
    silent: true
    vars:
      COVERAGE_TARGET: '{{.COVERAGE_TARGET | default "75"}}'
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Get this codebase to {{.COVERAGE_TARGET}}% test coverage.

        Start by measuring current coverage with 'go test ./... -coverprofile=coverage.out -count=1'.
        Analyze gaps with 'go tool cover -func=coverage.out'.
        Prioritize packages by impact — most uncovered statements first.
        Write tests for each priority package, verify they pass, and iterate.

        Target: {{.COVERAGE_TARGET}}% total coverage.
        Use table-driven tests ([]struct + t.Run) for any function with 2+ test cases.
        Only create or modify _test.go files. Never edit source code." \
          --agent go-tests \
          --working-dir {{.WORKING_DIR}} \
          --api-key {{.API_KEY}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --out /tmp/squad-go-tests.txt
      - echo "Test coverage output written to /tmp/squad-go-tests.txt"
      - |
        echo ""
        echo "Running final verification..."
      - go test ./...
      - echo "go test ./... PASSED"

  run:go-tests-analyze:
    desc: "Run the go-tests agent in readonly mode to analyze coverage gaps without writing tests"
    silent: true
    vars:
      COVERAGE_TARGET: '{{.COVERAGE_TARGET | default "75"}}'
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Analyze this codebase's test coverage gaps. Target is {{.COVERAGE_TARGET}}%.

        Measure current coverage, identify gaps, classify functions as testable vs
        needing refactor, and produce a prioritized report of what to test first.

        Do NOT write or modify any files." \
          --agent go-tests --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          --api-key {{.API_KEY}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out /tmp/squad-go-tests-analysis.txt
      - echo "Coverage analysis written to /tmp/squad-go-tests-analysis.txt"

  run:go-cobra:
    desc: "Run the go-cobra agent to autonomously fix Cobra/Viper best-practice violations"
    silent: true
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Review and fix all Cobra/Viper best-practice violations in this codebase.

        Start by using Glob with '**/*.go' to discover all Go source files.
        Read each file in cmd/ and internal/ that imports cobra or viper.
        Cross-reference between files for integration issues.
        Apply fixes via Edit tool, highest severity first.
        Run 'go build ./...' after each batch of edits.

        IMPORTANT CONSTRAINTS (repeat from system prompt):
        - Only modify files in cmd/ and internal/
        - No cosmetic changes (doc comments, import ordering, naming style)
        - No new dependencies
        - Skip fixes needing 50+ lines or new files
        - Preserve backwards compatibility — no flag renames or removals
        - Every file touched must appear in the output report" \
          --agent go-cobra \
          --working-dir {{.WORKING_DIR}} \
          --api-key {{.API_KEY}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --out /tmp/squad-go-cobra.txt
      - echo "Cobra review output written to /tmp/squad-go-cobra.txt"
      - |
        echo ""
        echo "Running final verification..."
      - go build ./...
      - echo "go build ./... PASSED"

  run:go-cobra-analyze:
    desc: "Run the go-cobra agent in readonly mode to analyze Cobra/Viper violations without applying fixes"
    silent: true
    cmds:
      - |
        go run ./cmd/squad run -v \
          "Analyze this codebase for Cobra/Viper best-practice violations.

        Use Glob with '**/*.go' to discover all Go source files.
        Read each file in cmd/ and internal/ that imports cobra or viper.
        Cross-reference between files for integration issues.
        Produce a prioritized report of all findings.

        Do NOT write or modify any files." \
          --agent go-cobra --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          --api-key {{.API_KEY}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out /tmp/squad-go-cobra-analysis.txt
      - echo "Cobra analysis written to /tmp/squad-go-cobra-analysis.txt"

  clean:
    desc: Clean build artifacts and temp files
    cmds:
      - task: go:clean
      - rm -f /tmp/squad-*.txt
