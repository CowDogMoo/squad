---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  BINARY_NAME: squad
  CMD_PATH: ./cmd/squad

  # Provider configuration
  PROVIDER: '{{.PROVIDER | default "ollama"}}'
  BASE_URL: '{{.BASE_URL | default ""}}'
  MODEL: '{{.MODEL | default "qwen3-coder:30b"}}'
  API_KEY: '{{.API_KEY | default ""}}'

  # Agent configuration
  AGENT: '{{.AGENT | default "go-cobra"}}'
  WORKING_DIR: '{{.WORKING_DIR | default "."}}'
  OUT_DIR: '{{.OUT_DIR | default "/tmp"}}'
  OUT: '{{.OUT | default (print .OUT_DIR "/squad-response.txt")}}'

  # Internal: conditionally include --base-url flag
  _BASE_URL_FLAG: '{{if .BASE_URL}}--base-url {{.BASE_URL}}{{end}}'
  _API_KEY_FLAG: '{{if .API_KEY}}--api-key {{.API_KEY}}{{end}}'

includes:
  go:
    taskfile: "https://raw.githubusercontent.com/CowDogMoo/taskfile-templates/main/go/Taskfile.yaml"
    vars:
      BINARY_NAME: '{{.BINARY_NAME}}'
      CMD_PATH: '{{.CMD_PATH}}'
  pre-commit:
    taskfile: "https://raw.githubusercontent.com/CowDogMoo/taskfile-templates/main/pre-commit/Taskfile.yaml"

tasks:
  default:
    desc: Build, test, and clean
    cmds:
      - task: go:default

  run:
    desc: "Run an agent with a prompt (usage: task run PROMPT='your prompt here')"
    silent: true
    vars:
      PROMPT: '{{.PROMPT | default ""}}'
    preconditions:
      - sh: test -n "{{.PROMPT}}"
        msg: "PROMPT is required. Usage: task run PROMPT='your prompt here'"
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          "{{.PROMPT}}" \
          --agent {{.AGENT}} \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --out {{.OUT}}

  run:go-review:
    desc: "Run the go-review agent to autonomously fix Go code quality issues"
    silent: true
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent go-review \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --out {{.OUT_DIR}}/squad-go-review.txt
      - echo "Review output written to {{.OUT_DIR}}/squad-go-review.txt"
      - |
        echo ""
        echo "Running final verification..."
      - go build ./...
      - echo "go build ./... PASSED"

  run:go-review-analyze:
    desc: "Run the go-review agent in readonly mode to analyze Go code quality without applying fixes"
    silent: true
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent go-review --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out {{.OUT_DIR}}/squad-go-review-analysis.txt
      - echo "Go review analysis written to {{.OUT_DIR}}/squad-go-review-analysis.txt"

  run:go-tests:
    desc: "Run the go-tests agent to autonomously increase test coverage to a target"
    silent: true
    vars:
      COVERAGE_TARGET: '{{.COVERAGE_TARGET | default "75"}}'
      COST_BUDGET: '{{.COST_BUDGET | default "5"}}'
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent go-tests \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --max-iterations 200 \
          --max-cost {{.COST_BUDGET}} \
          --var COVERAGE_TARGET={{.COVERAGE_TARGET}} \
          --out {{.OUT_DIR}}/squad-go-tests.txt
      - echo "Test coverage output written to {{.OUT_DIR}}/squad-go-tests.txt"
      - |
        echo ""
        echo "Running final verification..."
      - cd {{.WORKING_DIR}} && go test ./...
      - echo "go test ./... PASSED"

  run:go-tests-analyze:
    desc: "Run the go-tests agent in readonly mode to analyze coverage gaps without writing tests"
    silent: true
    vars:
      COVERAGE_TARGET: '{{.COVERAGE_TARGET | default "75"}}'
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent go-tests --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --var COVERAGE_TARGET={{.COVERAGE_TARGET}} \
          --out {{.OUT_DIR}}/squad-go-tests-analysis.txt
      - echo "Coverage analysis written to {{.OUT_DIR}}/squad-go-tests-analysis.txt"

  run:go-cobra:
    desc: "Run the go-cobra agent to autonomously fix Cobra/Viper best-practice violations"
    silent: true
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent go-cobra \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --out {{.OUT_DIR}}/squad-go-cobra.txt
      - echo "Cobra review output written to {{.OUT_DIR}}/squad-go-cobra.txt"
      - |
        echo ""
        echo "Running final verification..."
      - go build ./...
      - echo "go build ./... PASSED"

  run:go-cobra-analyze:
    desc: "Run the go-cobra agent in readonly mode to analyze Cobra/Viper violations without applying fixes"
    silent: true
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent go-cobra --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out {{.OUT_DIR}}/squad-go-cobra-analysis.txt
      - echo "Cobra analysis written to {{.OUT_DIR}}/squad-go-cobra-analysis.txt"

  run:go-doc-comments:
    desc: "Run the go-doc-comments agent to autonomously add/improve Go doc comments"
    silent: true
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent go-doc-comments \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --out {{.OUT_DIR}}/squad-go-doc-comments.txt
      - echo "Doc comments output written to {{.OUT_DIR}}/squad-go-doc-comments.txt"
      - |
        echo ""
        echo "Running final verification..."
      - cd {{.WORKING_DIR}} && go build ./...
      - echo "go build ./... PASSED"

  run:go-doc-comments-analyze:
    desc: "Run the go-doc-comments agent in readonly mode to analyze doc comment gaps without applying fixes"
    silent: true
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent go-doc-comments --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out {{.OUT_DIR}}/squad-go-doc-comments-analysis.txt
      - echo "Doc comments analysis written to {{.OUT_DIR}}/squad-go-doc-comments-analysis.txt"

  run:go-security-audit:
    desc: "Run the go-security-audit agent to autonomously fix Go security vulnerabilities"
    silent: true
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent go-security-audit \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --out {{.OUT_DIR}}/squad-go-security-audit.txt
      - echo "Security audit output written to {{.OUT_DIR}}/squad-go-security-audit.txt"
      - |
        echo ""
        echo "Running final verification..."
      - go build ./...
      - echo "go build ./... PASSED"

  run:go-security-audit-analyze:
    desc: "Run the go-security-audit agent in readonly mode to analyze security without applying fixes"
    silent: true
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent go-security-audit --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out {{.OUT_DIR}}/squad-go-security-audit-analysis.txt
      - echo "Security audit analysis written to {{.OUT_DIR}}/squad-go-security-audit-analysis.txt"

  run:go-taskfile:
    desc: "Run the go-taskfile agent to autonomously fix Taskfile.yaml best-practice violations"
    silent: true
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent go-taskfile \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --out {{.OUT_DIR}}/squad-go-taskfile.txt
      - echo "Taskfile review output written to {{.OUT_DIR}}/squad-go-taskfile.txt"
      - |
        echo ""
        echo "Running final verification..."
      - task --list
      - echo "task --list PASSED"

  run:go-taskfile-analyze:
    desc: "Run the go-taskfile agent in readonly mode to analyze Taskfile violations without applying fixes"
    silent: true
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent go-taskfile --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out {{.OUT_DIR}}/squad-go-taskfile-analysis.txt
      - echo "Taskfile analysis written to {{.OUT_DIR}}/squad-go-taskfile-analysis.txt"

  run:python-review:
    desc: "Run the python-review agent to autonomously fix Python code quality issues"
    silent: true
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent python-review \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --out {{.OUT_DIR}}/squad-python-review.txt
      - echo "Python review output written to {{.OUT_DIR}}/squad-python-review.txt"
      - |
        echo ""
        echo "Running final verification..."
      - cd {{.WORKING_DIR}} && ruff check . || true
      - echo "Verification complete"

  run:python-review-analyze:
    desc: "Run the python-review agent in readonly mode to analyze Python code quality without applying fixes"
    silent: true
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent python-review --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out {{.OUT_DIR}}/squad-python-review-analysis.txt
      - echo "Python review analysis written to {{.OUT_DIR}}/squad-python-review-analysis.txt"

  run:python-tests:
    desc: "Run the python-tests agent to autonomously increase Python test coverage"
    silent: true
    vars:
      COVERAGE_TARGET: '{{.COVERAGE_TARGET | default "75"}}'
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent python-tests \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --max-iterations 200 \
          --var COVERAGE_TARGET={{.COVERAGE_TARGET}} \
          --out {{.OUT_DIR}}/squad-python-tests.txt
      - echo "Python test coverage output written to {{.OUT_DIR}}/squad-python-tests.txt"
      - |
        echo ""
        echo "Running final verification..."
      - cd {{.WORKING_DIR}} && pytest -v || true
      - echo "Verification complete"

  run:python-tests-analyze:
    desc: "Run the python-tests agent in readonly mode to analyze coverage gaps without writing tests"
    silent: true
    vars:
      COVERAGE_TARGET: '{{.COVERAGE_TARGET | default "75"}}'
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent python-tests --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --var COVERAGE_TARGET={{.COVERAGE_TARGET}} \
          --out {{.OUT_DIR}}/squad-python-tests-analysis.txt
      - echo "Python coverage analysis written to {{.OUT_DIR}}/squad-python-tests-analysis.txt"

  run:python-doc-comments:
    desc: "Run the python-doc-comments agent to autonomously add/improve Python docstrings"
    silent: true
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent python-doc-comments \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --out {{.OUT_DIR}}/squad-python-doc-comments.txt
      - echo "Python doc comments output written to {{.OUT_DIR}}/squad-python-doc-comments.txt"
      - |
        echo ""
        echo "Running final verification..."
      - cd {{.WORKING_DIR}} && python -m py_compile $(find . -name "*.py" -not -path "*/__pycache__/*" -not -path "*/.venv/*" -not -path "*/venv/*" -not -name "test_*.py" 2>/dev/null | head -20) 2>/dev/null || true
      - echo "Verification complete"

  run:python-doc-comments-analyze:
    desc: "Run the python-doc-comments agent in readonly mode to analyze docstring gaps without applying fixes"
    silent: true
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent python-doc-comments --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out {{.OUT_DIR}}/squad-python-doc-comments-analysis.txt
      - echo "Python doc comments analysis written to {{.OUT_DIR}}/squad-python-doc-comments-analysis.txt"

  run:ansible-review:
    desc: "Run the ansible-review agent to autonomously fix Ansible code quality issues"
    silent: true
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent ansible-review \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --out {{.OUT_DIR}}/squad-ansible-review.txt
      - echo "Ansible review output written to {{.OUT_DIR}}/squad-ansible-review.txt"
      - |
        echo ""
        echo "Running final verification..."
      - cd {{.WORKING_DIR}} && ansible-lint . 2>/dev/null || true
      - echo "Verification complete"

  run:ansible-review-analyze:
    desc: "Run the ansible-review agent in readonly mode to analyze Ansible code quality without applying fixes"
    silent: true
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent ansible-review --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out {{.OUT_DIR}}/squad-ansible-review-analysis.txt
      - echo "Ansible review analysis written to {{.OUT_DIR}}/squad-ansible-review-analysis.txt"

  run:ansible-molecule:
    desc: "Run the ansible-molecule agent to autonomously fix Molecule test quality issues"
    silent: true
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent ansible-molecule \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=true \
          --temperature 0.3 \
          --out {{.OUT_DIR}}/squad-ansible-molecule.txt
      - echo "Ansible Molecule review output written to {{.OUT_DIR}}/squad-ansible-molecule.txt"
      - |
        echo ""
        echo "Running final verification..."
      - cd {{.WORKING_DIR}} && ansible-lint molecule/ 2>/dev/null || true
      - echo "Verification complete"

  run:ansible-molecule-analyze:
    desc: "Run the ansible-molecule agent in readonly mode to analyze Molecule test quality without applying fixes"
    silent: true
    cmds:
      - |
        go run {{.CMD_PATH}} run -v \
          --agent ansible-molecule --mode readonly \
          --working-dir {{.WORKING_DIR}} \
          {{._API_KEY_FLAG}} \
          --provider {{.PROVIDER}} \
          {{._BASE_URL_FLAG}} \
          --model {{.MODEL}} \
          --require-actionable=false \
          --temperature 0.3 \
          --print=false \
          --out {{.OUT_DIR}}/squad-ansible-molecule-analysis.txt
      - echo "Ansible Molecule analysis written to {{.OUT_DIR}}/squad-ansible-molecule-analysis.txt"

  clean:
    desc: Clean build artifacts and temp files
    cmds:
      - task: go:clean
      - rm -f {{.OUT_DIR}}/squad-*.txt
